<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OR-I 出席確認</title>
<style>
  :root {
    --navy: #1A2744;
    --accent: #4A90D9;
    --gold: #E8B84B;
    --light: #F5F7FA;
    --danger: #E74C3C;
    --success: #27AE60;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
    background: var(--light);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 32px;
    width: 100%;
    max-width: 440px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .header h1 {
    font-size: 20px;
    color: var(--navy);
    margin-bottom: 4px;
  }

  .header .lecture-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-weight: 700;
    font-size: 14px;
    padding: 4px 16px;
    border-radius: 20px;
  }

  .step { display: none; }
  .step.active { display: block; }

  label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 6px;
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    border: 2px solid #ddd;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 16px;
    transition: background 0.2s;
  }

  .btn:hover { background: #3A7BC8; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .btn.danger { background: var(--danger); }
  .btn.success { background: var(--success); }

  .timer-bar {
    width: 100%;
    height: 6px;
    background: #e0e0e0;
    border-radius: 3px;
    margin: 12px 0;
    overflow: hidden;
  }

  .timer-bar .fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.5s linear, background 0.3s;
  }

  .timer-bar .fill.warn { background: var(--gold); }
  .timer-bar .fill.critical { background: var(--danger); }

  .timer-text {
    text-align: center;
    font-size: 14px;
    color: #888;
  }

  .question-box {
    background: var(--light);
    border-left: 4px solid var(--accent);
    padding: 16px;
    border-radius: 0 8px 8px 0;
    margin: 16px 0;
  }

  .question-box .q-label {
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 8px;
  }

  .question-box .q-text {
    font-size: 16px;
    color: var(--navy);
    line-height: 1.6;
  }

  .result-icon {
    text-align: center;
    font-size: 64px;
    margin: 16px 0;
  }

  .result-msg {
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-detail {
    text-align: center;
    font-size: 14px;
    color: #888;
    line-height: 1.6;
  }

  .error-msg {
    background: #FFF3F3;
    color: var(--danger);
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 6px;
    margin-top: 8px;
    display: none;
  }

  .student-id-display {
    font-size: 13px;
    color: #888;
    text-align: right;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>オペレーションズ・リサーチ I</h1>
    <span class="lecture-badge" id="lectureBadge">第 ? 回</span>
  </div>

  <!-- Step 1: 学籍番号入力 -->
  <div class="step active" id="step1">
    <label for="studentId">学籍番号を入力してください</label>
    <input type="text" id="studentId" placeholder="例: 24T0001"
           pattern="[0-9A-Za-z]+" maxlength="20" autocomplete="off">
    <div class="error-msg" id="idError"></div>
    <button class="btn" id="btnStart" onclick="startQuestion()">出席確認を開始</button>
  </div>

  <!-- Step 2: 問題回答 -->
  <div class="step" id="step2">
    <div class="student-id-display" id="sidDisplay"></div>

    <div class="question-box">
      <div class="q-label">出席確認問題</div>
      <div class="q-text" id="questionText"></div>
    </div>

    <label for="answerInput">回答を入力</label>
    <input type="text" id="answerInput" autocomplete="off" inputmode="text">

    <div class="timer-bar"><div class="fill" id="timerFill"></div></div>
    <div class="timer-text" id="timerText">残り 60 秒</div>

    <div class="error-msg" id="ansError"></div>
    <button class="btn" id="btnSubmit" onclick="submitAnswer()">回答を提出</button>
  </div>

  <!-- Step 3: 結果表示 -->
  <div class="step" id="step3">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-detail" id="resultDetail"></div>
  </div>

  <!-- 期限切れ -->
  <div class="step" id="stepExpired">
    <div class="result-icon">&#x23F0;</div>
    <div class="result-msg" style="color:var(--danger)">時間切れです</div>
    <div class="result-detail">制限時間内に回答できませんでした。<br>教員に申し出てください。</div>
  </div>

  <!-- コード不正 -->
  <div class="step" id="stepInvalidCode">
    <div class="result-icon">&#x1F6AB;</div>
    <div class="result-msg" style="color:var(--danger)">アクセスコードが無効です</div>
    <div class="result-detail">このURLでは出席確認ができません。<br>教室で提示されたQRコードを<br>読み取ってアクセスしてください。</div>
  </div>

  <!-- 同一端末からの重複回答 -->
  <div class="step" id="stepAlreadyAnswered">
    <div class="result-icon">&#x1F6D1;</div>
    <div class="result-msg" style="color:var(--gold)">この端末では回答済みです</div>
    <div class="result-detail">この端末から既に出席回答が送信されています。<br>1台の端末で回答できるのは1回のみです。</div>
  </div>
</div>

// ====================================================================
// State
// ====================================================================
let state = {
  lecture: null,
  code: null,       // ワンタイムコード（URLパラメータから取得）
  deviceId: null,   // 端末識別子
  studentId: null,
  question: null,
  correctAnswer: null,
  startTime: null,
  timerId: null,
  timeLeft: CONFIG.TIME_LIMIT,
};

// ====================================================================
// 端末フィンガープリント（簡易）
// ====================================================================
function generateDeviceId() {
  const raw = [
    navigator.userAgent,
    navigator.language,
    screen.width + "x" + screen.height,
    screen.colorDepth,
    Intl.DateTimeFormat().resolvedOptions().timeZone,
    navigator.hardwareConcurrency || "",
    navigator.maxTouchPoints || ""
  ].join("|");
  // ハッシュ化して短い文字列に
  let h = 0;
  for (let i = 0; i < raw.length; i++) {
    h = ((h << 5) - h + raw.charCodeAt(i)) | 0;
  }
  return "d" + Math.abs(h).toString(36);
}

// ====================================================================
// 同一端末の重複回答チェック
// ====================================================================
function hasAlreadyAnswered() {
  try {
    const key = `or1_answered_${state.lecture}_${state.code}`;
    return sessionStorage.getItem(key) !== null;
  } catch (e) { return false; }
}

function markAsAnswered(studentId) {
  try {
    const key = `or1_answered_${state.lecture}_${state.code}`;
    sessionStorage.setItem(key, studentId);
  } catch (e) { /* sessionStorage使えない環境は無視 */ }
}

// ====================================================================
// 初期化
// ====================================================================
window.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const lec = params.get("lecture") || params.get("lec") || params.get("l");
  const code = params.get("code");

  if (lec) {
    state.lecture = parseInt(lec, 10);
    document.getElementById("lectureBadge").textContent = `第 ${state.lecture} 回`;
  } else {
    document.getElementById("lectureBadge").textContent = "講義回未指定";
  }

  // ワンタイムコード検証
  if (!code || !/^\d{4}$/.test(code)) {
    // コードがない、または不正 → アクセス拒否
    showStep("stepInvalidCode");
    document.getElementById("btnStart").disabled = true;
    return;
  }
  state.code = code;
  state.deviceId = generateDeviceId();

  // 同一端末での重複回答チェック
  if (hasAlreadyAnswered()) {
    showStep("stepAlreadyAnswered");
    document.getElementById("btnStart").disabled = true;
    return;
  }

  // Enter キーで次へ
  document.getElementById("studentId").addEventListener("keydown", e => {
    if (e.key === "Enter") startQuestion();
  });
  document.getElementById("answerInput").addEventListener("keydown", e => {
    if (e.key === "Enter") submitAnswer();
  });
});

// ====================================================================
// Step 1 → Step 2: 問題生成
// ====================================================================
function startQuestion() {
  const sid = document.getElementById("studentId").value.trim();
  const errEl = document.getElementById("idError");

  if (!sid) {
    errEl.textContent = "学籍番号を入力してください";
    errEl.style.display = "block";
    return;
  }
  if (!/^[0-9A-Za-z]+$/.test(sid)) {
    errEl.textContent = "半角英数字で入力してください";
    errEl.style.display = "block";
    return;
  }
  errEl.style.display = "none";

  state.studentId = sid;

  // 問題を選択（学籍番号＋講義回でハッシュ → 問題インデックス）
  const bank = QUESTION_BANK[state.lecture] || QUESTION_BANK[1];
  const hash = simpleHash(sid + "_" + state.lecture);
  const idx = hash % bank.length;
  const selected = bank[idx];

  state.question = selected.q;
  state.correctAnswer = selected.a;

  document.getElementById("questionText").textContent = selected.q;
  document.getElementById("sidDisplay").textContent = `学籍番号: ${sid}`;

  showStep("step2");
  document.getElementById("answerInput").focus();

  // タイマー開始
  state.startTime = Date.now();
  state.timeLeft = CONFIG.TIME_LIMIT;
  startTimer();
}

// ====================================================================
// タイマー
// ====================================================================
function startTimer() {
  updateTimerDisplay();
  state.timerId = setInterval(() => {
    const elapsed = (Date.now() - state.startTime) / 1000;
    state.timeLeft = Math.max(0, CONFIG.TIME_LIMIT - elapsed);
    updateTimerDisplay();

    if (state.timeLeft <= 0) {
      clearInterval(state.timerId);
      showStep("stepExpired");
      markAsAnswered(state.studentId || "timeout");
      // 時間切れでも記録を送信（不正解として）
      sendToGAS(false, CONFIG.TIME_LIMIT);
    }
  }, 500);
}

function updateTimerDisplay() {
  const pct = (state.timeLeft / CONFIG.TIME_LIMIT) * 100;
  const fill = document.getElementById("timerFill");
  fill.style.width = pct + "%";
  fill.className = "fill" +
    (pct < 20 ? " critical" : pct < 40 ? " warn" : "");

  document.getElementById("timerText").textContent =
    `残り ${Math.ceil(state.timeLeft)} 秒`;
}

// ====================================================================
// Step 2 → Step 3: 回答提出
// ====================================================================
function submitAnswer() {
  clearInterval(state.timerId);
  const answer = document.getElementById("answerInput").value.trim();
  const errEl = document.getElementById("ansError");

  if (!answer) {
    errEl.textContent = "回答を入力してください";
    errEl.style.display = "block";
    startTimer(); // タイマー再開
    return;
  }
  errEl.style.display = "none";

  const elapsed = ((Date.now() - state.startTime) / 1000).toFixed(1);
  const correct = checkAnswer(answer, state.correctAnswer);

  // 結果表示
  document.getElementById("resultIcon").textContent = correct ? "\u2705" : "\u274C";
  document.getElementById("resultMsg").textContent =
    correct ? "出席を記録しました" : "不正解ですが出席は記録しました";
  document.getElementById("resultMsg").style.color =
    correct ? "var(--success)" : "var(--gold)";
  document.getElementById("resultDetail").innerHTML =
    `学籍番号: ${state.studentId}<br>` +
    `第${state.lecture}回 / 回答時間: ${elapsed}秒` +
    (correct ? "" : `<br><small>正解: ${state.correctAnswer}</small>`);

  showStep("step3");

  // 回答済みとしてマーク（同一端末からの再回答をブロック）
  markAsAnswered(state.studentId);

  // Google Sheets に送信
  sendToGAS(correct, parseFloat(elapsed));
}

// ====================================================================
// 回答チェック（柔軟な一致判定）
// ====================================================================
function checkAnswer(userAns, correctAns) {
  const normalize = s => s
    .toLowerCase()
    .replace(/\s+/g, "")
    .replace(/[ー−\-]/g, "")
    .replace(/０/g,"0").replace(/１/g,"1").replace(/２/g,"2")
    .replace(/３/g,"3").replace(/４/g,"4").replace(/５/g,"5")
    .replace(/６/g,"6").replace(/７/g,"7").replace(/８/g,"8")
    .replace(/９/g,"9")
    .replace(/[Ａ-Ｚ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFF21 + 0x41))
    .replace(/[ａ-ｚ]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFF41 + 0x61));

  return normalize(userAns) === normalize(correctAns);
}

// ====================================================================
// Google Sheets 送信
// ====================================================================
function sendToGAS(correct, elapsedSec) {
  if (!CONFIG.GAS_URL) {
    console.log("GAS_URL未設定。ローカルログ:", {
      lecture: state.lecture,
      studentId: state.studentId,
      question: state.question,
      answer: document.getElementById("answerInput").value.trim(),
      correct,
      elapsedSec
    });
    return;
  }

  const payload = {
    lecture: state.lecture,
    studentId: state.studentId,
    question: state.question,
    answer: document.getElementById("answerInput").value.trim(),
    correct,
    elapsedSec,
    code: state.code,
    deviceId: state.deviceId
  };

  fetch(CONFIG.GAS_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  }).catch(err => {
    console.error("送信エラー:", err);
  });
}

// ====================================================================
// ユーティリティ
// ====================================================================
function showStep(id) {
  document.querySelectorAll(".step").forEach(el => el.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const c = str.charCodeAt(i);
    hash = ((hash << 5) - hash + c) | 0;
  }
  return Math.abs(hash);
}
